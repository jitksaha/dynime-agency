name: Deploy to Hostinger (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup PHP & Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql, gd, zip
          tools: composer:v2

      - name: Install backend dependencies
        run: |
          cd dynime-api
          composer install --no-dev --optimize-autoloader

      - name: Package backend ZIP
        run: |
          cd dynime-api
          zip -r ../dynime-api.zip . -x ".git*" -x "node_modules/*" -x "tests/*" -x "storage/logs/*" -x "storage/framework/cache/data/*" -x ".env*" -x ".phpunit.result.cache"

      - name: Copy backend package to dist for FTP upload
        run: cp dynime-api.zip dist/

      - name: 📂 Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: 📂 Sync files to Hostinger via lftp
        run: |
          lftp -e "set net:timeout 30; set net:max-retries 10; set net:reconnect-interval-multiplier 2; set net:limit-rate 0; set ssl:verify-certificate no; set ftp:ssl-allow yes; open -u '${{ secrets.HOSTINGER_FTP_USERNAME }}','${{ secrets.HOSTINGER_FTP_PASSWORD }}' -p 21 ${{ secrets.HOSTINGER_FTP_SERVER }}; mirror -R --parallel=2 ./dist/ ./; quit"

      - name: 🚀 Trigger Backend Deployment Webhook
        run: |
          echo "Triggering Hostinger API extraction..."
          curl -s "https://dynime.com/deploy-api.php?token=deploy_token_7782"
