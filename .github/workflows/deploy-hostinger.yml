name: Deploy to Hostinger (Production)

# Force build trigger
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup PHP & Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql, gd, zip
          tools: composer:v2

      - name: Install backend dependencies
        run: |
          cd dynime-api
          composer install --no-dev --optimize-autoloader

      - name: Package backend ZIP
        run: |
          cd dynime-api
          zip -r ../dynime-api.zip . -x ".git*" -x "node_modules/*" -x "tests/*" -x "storage/logs/*" -x "storage/framework/cache/data/*" -x ".env*" -x ".phpunit.result.cache"

      - name: Copy backend package to dist for FTP upload
        run: cp dynime-api.zip dist/

      - name: 📂 Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: 📂 Sync files to Hostinger via lftp
        run: |
          # Fetch FTP structure first
          lftp -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; open -u '${{ secrets.HOSTINGER_FTP_USERNAME }}','${{ secrets.HOSTINGER_FTP_PASSWORD }}' -p 21 ${{ secrets.HOSTINGER_FTP_SERVER }}; find . > ftp-structure.txt; quit"
          
          TARGET_DIR="public_html/"
          
          # Clean up mistakenly uploaded files in the domain root (outside of public_html)
          echo "Cleaning up mistaken files in the domain root..."
          lftp -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; open -u '${{ secrets.HOSTINGER_FTP_USERNAME }}','${{ secrets.HOSTINGER_FTP_PASSWORD }}' -p 21 ${{ secrets.HOSTINGER_FTP_SERVER }}; rm -f setup-hostinger.php deploy-api.php index.html || true; quit" || true
          
          # Clean up the nested public_html/public_html folder if it exists
          if grep -q "^\./public_html/public_html/$" ftp-structure.txt; then
            echo "Found nested public_html/public_html folder. Deleting it..."
            lftp -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; open -u '${{ secrets.HOSTINGER_FTP_USERNAME }}','${{ secrets.HOSTINGER_FTP_PASSWORD }}' -p 21 ${{ secrets.HOSTINGER_FTP_SERVER }}; glob -d rm -r public_html/public_html; quit" || true
          fi
          
          echo "Executing file sync to $TARGET_DIR..."
          lftp -e "set net:timeout 30; set net:max-retries 10; set net:reconnect-interval-multiplier 2; set net:limit-rate 0; set ssl:verify-certificate no; set ftp:ssl-allow yes; open -u '${{ secrets.HOSTINGER_FTP_USERNAME }}','${{ secrets.HOSTINGER_FTP_PASSWORD }}' -p 21 ${{ secrets.HOSTINGER_FTP_SERVER }}; mirror -R --parallel=2 ./dist/ $TARGET_DIR; quit"

      - name: 🚀 Commit and Push FTP Structure
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "actions@github.com"
          git add ftp-structure.txt || true
          git commit -m "chore: archive FTP structure [skip ci]" || true
          git push origin main || true

      - name: 🚀 Trigger Backend Deployment Webhook
        run: |
          echo "Triggering Hostinger API extraction..."
          curl -s "https://dynime.com/deploy-api.php?token=deploy_token_7782"


