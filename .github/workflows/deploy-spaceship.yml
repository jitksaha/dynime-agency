name: Deploy Frontend to Spaceship (cPanel)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Spaceship
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup PHP & Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql, gd, zip
          tools: composer:v2

      - name: Install backend dependencies
        run: |
          cd dynime-api
          composer install --no-dev --optimize-autoloader

      - name: Package backend ZIP
        run: |
          cd dynime-api
          zip -r ../dynime-api.zip . -x ".git*" -x "node_modules/*" -x "tests/*" -x "storage/logs/*" -x "storage/framework/cache/data/*" -x ".env*" -x ".phpunit.result.cache"

      - name: Copy backend package to dist for FTP upload
        run: cp dynime-api.zip dist/

      - name: 📂 Sync files to Spaceship
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SPACESHIP_FTP_SERVER }}
          username: ${{ secrets.SPACESHIP_FTP_USERNAME }}
          password: ${{ secrets.SPACESHIP_FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: ./

      - name: 🚀 Trigger Backend Deployment Webhook
        run: |
          echo "Triggering Spaceship API extraction..."
          curl -s "https://dynime.com/deploy-api.php?token=deploy_token_7782"

