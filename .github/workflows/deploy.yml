name: Dynime CI/CD Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install root dependencies
        run: npm ci

      - name: Verify frontend build compilation
        run: npm run build

      - name: Install NestJS backend dependencies
        run: |
          cd backend
          npm ci

      - name: Verify backend build compilation
        run: |
          cd backend
          npm run build

  deploy:
    name: Auto Deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Execute update script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /app
            chmod +x scripts/update-server.sh
            bash scripts/update-server.sh
