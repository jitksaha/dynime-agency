  <body>
    <style>
      /* Apple-style boot loader: brand logo + ultra-thin progress.
         Background + logo flip with the app's theme (light/dark) so the
         first paint matches the user's actual color scheme — no white flash
         in dark mode and no black flash in light mode.
         We don't pick a color here; main.tsx adds .light/.dark on <html>
         BEFORE this paints, so we just inherit via the rules below. */
      html.light #app-boot { background: #ffffff; }
      html.dark  #app-boot { background: #000000; }
      #app-boot {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: #ffffff; /* fallback before theme class lands */
        transition: opacity .55s ease, visibility .55s ease;
        -webkit-font-smoothing: antialiased;
      }
      #app-boot .boot-stage {
        display: flex; flex-direction: column; align-items: center; gap: 18px;
        /* No entrance animation — logo + wordmark appear instantly. */
      }
      #app-boot .boot-logo {
        width: 72px; height: 72px; object-fit: contain;
        /* Instant render: no pulse / scale delay. */
      }
      #app-boot .boot-wordmark {
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        line-height: 1;
      }
      #app-boot .boot-name {
        font-family: 'Comfortaa', system-ui, -apple-system, Segoe UI, sans-serif;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -0.01em;
        color: #0a0a0a;
      }
      html.dark #app-boot .boot-name { color: #ffffff; }
      #app-boot .boot-tagline {
        font-family: 'UberMove', 'Uber Move', 'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
        font-weight: 500;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: lowercase;
        color: #6b7280;
      }
      html.dark #app-boot .boot-tagline { color: #9ca3af; }
      /* Default: show light, hide dark (matches default theme in main.tsx).
         Once <html> gets .light or .dark, the rules below take over. */
      #app-boot .boot-logo-dark { display: none; }
      html.light #app-boot .boot-logo-dark  { display: none; }
      html.dark  #app-boot .boot-logo-light { display: none; }
      html.dark  #app-boot .boot-logo-dark  { display: block; }
      #app-boot .boot-track {
        width: 160px; height: 2px; border-radius: 2px;
        background: rgba(0,0,0,.08); overflow: hidden; margin-top: 6px;
      }
      html.dark #app-boot .boot-track { background: rgba(255,255,255,.12); }
      #app-boot .boot-fill {
        display: block; width: 40%; height: 100%; border-radius: 2px;
        background: linear-gradient(90deg, transparent, #635bff, transparent);
        animation: bootSlide 1.3s cubic-bezier(.65,.05,.36,1) infinite;
      }
      #app-boot.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      @keyframes bootSlide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-boot .boot-fill { animation: none !important; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Plus+Jakarta+Sans:wght@500&display=swap">
    <div id="app-boot" aria-hidden="true">
      <div class="boot-stage">
        <img class="boot-logo boot-logo-light" src="/dynime-icon-light.svg" alt="" width="72" height="72" decoding="async" fetchpriority="high" />
        <img class="boot-logo boot-logo-dark"  src="/dynime-icon-dark.svg"  alt="" width="72" height="72" decoding="async" fetchpriority="high" />
        <div class="boot-wordmark">
          <span class="boot-name">dynime</span>
          <span class="boot-tagline">complete business os</span>
        </div>
        <div class="boot-track"><span class="boot-fill"></span></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var root = document.getElementById('root');
        var boot = document.getElementById('app-boot');
        if (!root || !boot) return;
        var hidden = false;
        function hide() {
          if (hidden) return;
          hidden = true;
          boot.classList.add('is-hidden');
          setTimeout(function () { boot && boot.parentNode && boot.parentNode.removeChild(boot); }, 700);
        }
        var mo = new MutationObserver(function () {
          if (root.childElementCount > 0) { mo.disconnect(); hide(); }
        });
        mo.observe(root, { childList: true });
        // Hard safety net so the loader never sticks.
        setTimeout(hide, 6000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
